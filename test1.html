<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slideshow with Menu</title>
  <style>
    /* General styling */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Simple Menu styling */
    .menu {
      background-color: #333;
      overflow: hidden;
    }
    .menu a {
      float: left;
      display: block;
      color: #f2f2f2;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
    }
    .menu a:hover {
      background-color: #ddd;
      color: black;
    }

    /* Slideshow container styling */
    .slideshow-container {
      position: relative;
      max-width: 800px;
      margin: 20px auto;
    }
    .mySlides {
      display: none; /* Hide images by default */
    }
    .mySlides img {
      width: 100%;
      height: auto;
    }

    /* Next & previous buttons */
    .prev, .next {
      cursor: pointer;
      position: absolute;
      top: 50%;
      padding: 16px;
      margin-top: -22px;
      color: white;
      font-weight: bold;
      font-size: 18px;
      transition: 0.6s ease;
      user-select: none;
      background-color: rgba(0, 0, 0, 0.5);
      border-radius: 3px;
    }
    .next {
      right: 0;
    }
    .prev:hover, .next:hover {
      background-color: rgba(0, 0, 0, 0.8);
    }

    /* Dots (indicators) styling */
    .dot-container {
      text-align: center;
      padding: 10px;
      background: #ddd;
    }
    .dot {
      cursor: pointer;
      height: 15px;
      width: 15px;
      margin: 0 2px;
      background-color: #bbb;
      border-radius: 50%;
      display: inline-block;
      transition: background-color 0.6s ease;
    }
    .active, .dot:hover {
      background-color: #717171;
    }
  </style>
</head>
<body>

  <!-- Simple Menu -->
  <div class="menu">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>

  <!-- Slideshow Container -->
  <div class="slideshow-container">
    <!-- Slide 1 -->
    <div class="mySlides">
      <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/0c/bb/a3/97/predator-ride-in-the.jpg?w=1000&h=-1&s=1>
    </div>
    <!-- Slide 2 -->
    <div class="mySlides">
      <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/0c/bb/a3/97/predator-ride-in-the.jpg?w=1000&h=-1&s=1
      >
    </div>
    <!-- Slide 3 -->
    <div class="mySlides">
      <img src=https://dynamic-media-cdn.tripadvisor.com/media/photo-o/0c/bb/a3/97/predator-ride-in-the.jpg?w=1000&h=-1&s=1
    </div>

    <!-- Next and previous buttons -->
    <a class="prev">&#10094;</a>
    <a class="next">&#10095;</a>
  </div>

  <!-- Dot indicators -->
  <div class="dot-container">
    <span class="dot"></span> 
    <span class="dot"></span> 
    <span class="dot"></span> 
  </div>

  <script>
    // Set initial slide index
    let slideIndex = 0;
    const slides = document.getElementsByClassName("mySlides");
    const dots = document.getElementsByClassName("dot");
    let timer = null;

    // Function to display the current slide
    function showSlide(n) {
      // Reset index if out of bounds
      if (n >= slides.length) { slideIndex = 0; }
      if (n < 0) { slideIndex = slides.length - 1; }

      // Hide all slides and remove active class from dots
      for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";  
      }
      for (let i = 0; i < dots.length; i++) {
        dots[i].className = dots[i].className.replace(" active", "");
      }
      // Display the active slide and mark the corresponding dot
      slides[slideIndex].style.display = "block";
      dots[slideIndex].className += " active";
    }

    // Function to go to the next slide
    function nextSlide() {
      slideIndex++;
      showSlide(slideIndex);
    }

    // Function to go to the previous slide
    function prevSlide() {
      slideIndex--;
      showSlide(slideIndex);
    }

    // Set up event listeners for the next and previous buttons
    document.querySelector('.next').addEventListener('click', function(){
      nextSlide();
      resetTimer();
    });
    document.querySelector('.prev').addEventListener('click', function(){
      prevSlide();
      resetTimer();
    });

    // Set up event listeners for the dot indicators
    for (let i = 0; i < dots.length; i++) {
      dots[i].addEventListener('click', function(){
        slideIndex = i;
        showSlide(slideIndex);
        resetTimer();
      });
    }

    // Start the slideshow timer for automatic slide change every 3 seconds
    function startTimer() {
      timer = setInterval(function(){
        slideIndex++;
        showSlide(slideIndex);
      }, 3000);
    }

    // Reset the timer when a manual control is used
    function resetTimer() {
      clearInterval(timer);
      startTimer();
    }

    // Initialize the slideshow
    showSlide(slideIndex);
    startTimer();
  </script>

</body>
</html>
